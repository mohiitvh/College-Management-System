<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paid Students | Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fb;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.header h2{
    font-size:28px;
    color:#0f172a;
}

.back-btn{
    text-decoration:none;
    background:#2563eb;
    color:white;
    padding:10px 18px;
    border-radius:10px;
    font-weight:600;
    transition:.3s;
}

.back-btn:hover{
    background:#1d4ed8;
}

.card{
    background:white;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    overflow:hidden;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#0f172a;
    color:white;
}

th,td{
    padding:15px;
    text-align:center;
}

tbody tr{
    border-bottom:1px solid #eee;
    transition:.2s;
}

tbody tr:hover{
    background:#f8fafc;
}

.badge{
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
}

.paid{
    background:#dcfce7;
    color:#166534;
}

.pending{
    background:#fef3c7;
    color:#92400e;
}

.failed{
    background:#fee2e2;
    color:#b91c1c;
}

.amount{
    font-weight:600;
    color:#0f172a;
}

.no-data{
    text-align:center;
    padding:40px;
    color:#64748b;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h2>Paid Students</h2>

        <a th:href="@{/indexAdmin}" class="back-btn">
            ← Back Dashboard
        </a>
    </div>

    <div class="card">

        <table>

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Student</th>
                    <th>Course</th>
                    <th>Paid Amount</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>

                <tr th:if="${#lists.isEmpty(payments)}">
                    <td colspan="5" class="no-data">
                        No Paid Students Found
                    </td>
                </tr>

                <tr th:each="p : ${payments}">

                    <td th:text="${p.studentId}"></td>
                    <td th:text="${p.studentName}"></td>
                    <td th:text="${p.courseName}"></td>

                    <td class="amount">
                        ₹ <span th:text="${p.paidAmount}"></span>
                    </td>

                    <td>

                        <span th:if="${p.paymentStatus == 'PAID'}" class="badge paid">
                            PAID
                        </span>

                        <span th:if="${p.paymentStatus == 'PENDING'}" class="badge pending">
                            PENDING
                        </span>

                        <span th:if="${p.paymentStatus == 'FAILED'}" class="badge failed">
                            FAILED
                        </span>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
