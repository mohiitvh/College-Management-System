<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate Management | Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f6f9;
    padding:30px;
}

.container{
    max-width:1400px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.header h2{
    color:#0d6efd;
}

.back-btn{
    text-decoration:none;
    background:#0d6efd;
    color:#fff;
    padding:10px 18px;
    border-radius:8px;
    font-weight:600;
}

.card{
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#0d6efd;
    color:#fff;
}

th{
    padding:15px;
    text-align:left;
}

td{
    padding:15px;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f8fbff;
}

.badge{
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
}

.pending{
    background:#fff3cd;
    color:#856404;
}

.approved{
    background:#d4edda;
    color:#155724;
}

.rejected{
    background:#f8d7da;
    color:#721c24;
}

.btn{
    display:inline-block;
    padding:7px 14px;
    border-radius:8px;
    text-decoration:none;
    color:white;
    font-size:13px;
    margin:2px;
    font-weight:600;
}

.view{
    background:#0d6efd;
}

.approve{
    background:#198754;
}

.reject{
    background:#dc3545;
}

.empty{
    text-align:center;
    padding:40px;
    color:#666;
}

</style>

</head>
<body>

<div class="container">
<div class="header">

    <h2>Certificate Management</h2>

    <a th:href="@{/indexAdmin}"
       class="back-btn">
        ← Back Dashboard
    </a>
	
	<a class="btn back"
	   th:href="@{/certificate-management}">
	    ← Back
	</a>

</div>

<div class="card">

    <table>

        <thead>
        <tr>
            <th>ID</th>
            <th>Student</th>
            <th>Email</th>
            <th>Course</th>
            <th>Certificate</th>
            <th>Status</th>
            <th>Applied On</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:if="${#lists.isEmpty(certificates)}">
            <td colspan="8" class="empty">
                No Certificate Requests Found
            </td>
        </tr>

        <tr th:each="c : ${certificates}">

            <td th:text="${c.id}"></td>

            <td th:text="${c.studentName}"></td>

            <td th:text="${c.email}"></td>

            <td th:text="${c.courseName}"></td>

            <td th:text="${c.certificateType}"></td>

            <td>

                <span th:if="${c.status=='PENDING'}"
                      class="badge pending">
                    Pending
                </span>

                <span th:if="${c.status=='APPROVED'}"
                      class="badge approved">
                    Approved
                </span>

                <span th:if="${c.status=='REJECTED'}"
                      class="badge rejected">
                    Rejected
                </span>

            </td>

            <td th:text="${c.applyDate}"></td>

			<td>

			    <a th:href="@{'/admin/certificate/view/' + ${c.id}}"
			       class="btn view">
			        View
			    </a>

			    <span th:if="${c.status=='PENDING'}">

			        <a th:href="@{'/certificate/approve/' + ${c.id}}"
			           class="btn approve">
			            Approve
			        </a>

			        <a th:href="@{'/certificate/reject/' + ${c.id}}"
			           class="btn reject">
			            Reject
			        </a>

			    </span>

			</td>

        </tr>

        </tbody>

    </table>

</div>

</div>

</body>
</html>
