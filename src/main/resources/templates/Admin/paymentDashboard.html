<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Dashboard | Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: radial-gradient(circle at top,#eef2ff,#f8fafc,#eef2ff);
    padding:30px;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
}

.header h1{
    font-size:34px;
    font-weight:800;
    color:#0f172a;
    letter-spacing:.5px;
}

.back-btn{
    text-decoration:none;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    padding:11px 18px;
    border-radius:12px;
    font-weight:600;
    box-shadow:0 10px 25px rgba(37,99,235,.25);
    transition:.3s;
}

.back-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 35px rgba(37,99,235,.35);
}

/* STATS */
.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:22px;
    margin-bottom:40px;
}

.card{
    background:rgba(255,255,255,0.8);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.4);
    padding:28px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 12px 30px rgba(0,0,0,.08);
    transition:.3s;
    position:relative;
    overflow:hidden;
}

.card::before{
    content:"";
    position:absolute;
    width:100%;
    height:5px;
    top:0;
    left:0;
    background:linear-gradient(90deg,#2563eb,#22c55e,#f59e0b,#ef4444);
}

.card:hover{
    transform:translateY(-8px);
}

.card i{
    font-size:44px;
    color:#2563eb;
    margin-bottom:15px;
}

.card h2{
    font-size:34px;
    color:#0f172a;
    font-weight:800;
}

.card p{
    color:#64748b;
    font-size:14px;
    margin-top:5px;
}

/* MENU */
.menu-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:25px;
}

.menu-card{
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 12px 30px rgba(0,0,0,.08);
    transition:.3s;
    position:relative;
    overflow:hidden;
}

.menu-card::after{
    content:"";
    position:absolute;
    width:100%;
    height:3px;
    bottom:0;
    left:0;
    background:linear-gradient(90deg,#2563eb,#22c55e);
}

.menu-card:hover{
    transform:translateY(-8px);
    box-shadow:0 18px 40px rgba(0,0,0,.12);
}

.menu-card i{
    font-size:48px;
    margin-bottom:15px;
    color:#2563eb;
}

.menu-card h3{
    font-size:18px;
    color:#0f172a;
    margin-bottom:10px;
}

.menu-card p{
    font-size:13px;
    color:#64748b;
    margin-bottom:18px;
}

.menu-card a{
    display:inline-block;
    text-decoration:none;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    padding:10px 18px;
    border-radius:12px;
    font-weight:600;
    transition:.3s;
}

.menu-card a:hover{
    transform:scale(1.05);
}

/* RESPONSIVE */
@media(max-width:768px){
    .header h1{
        font-size:26px;
    }
}

</style>
</head>

<body>

<div class="header">

    <h1>💳 Payment Dashboard</h1>

    <a th:href="@{/indexAdmin}" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i> Back
    </a>

</div>

<!-- STATS -->
<div class="stats">

    <div class="card">
        <i class="fa-solid fa-credit-card"></i>
        <h2 th:text="${totalPayments}">0</h2>
        <p>Total Payments</p>
    </div>

    <div class="card">
        <i class="fa-solid fa-circle-check"></i>
        <h2 th:text="${paidCount}">0</h2>
        <p>Paid Students</p>
    </div>

    <div class="card">
        <i class="fa-solid fa-hourglass-half"></i>
        <h2 th:text="${pendingCount}">0</h2>
        <p>Pending Students</p>
    </div>

    <div class="card">
        <i class="fa-solid fa-wallet"></i>
        <h2 th:text="${dueCount}">0</h2>
        <p>Due Students</p>
    </div>

</div>

<!-- MENU -->
<div class="menu-grid">

    <div class="menu-card">
        <i class="fa-solid fa-list"></i>
        <h3>Payment List</h3>
        <p>View all payment records</p>
        <a th:href="@{/admin/payment/list}">Open</a>
    </div>

    <div class="menu-card">
        <i class="fa-solid fa-circle-check"></i>
        <h3>Paid</h3>
        <p>Completed payments</p>
        <a th:href="@{/admin/payment/paid}">View</a>
    </div>

    <div class="menu-card">
        <i class="fa-solid fa-hourglass-half"></i>
        <h3>Pending</h3>
        <p>Pending payments</p>
        <a th:href="@{/admin/payment/pending}">View</a>
    </div>

    <div class="menu-card">
        <i class="fa-solid fa-wallet"></i>
        <h3>Due</h3>
        <p>Outstanding dues</p>
        <a th:href="@{/admin/payment/due}">View</a>
    </div>

</div>

</body>
</html>
