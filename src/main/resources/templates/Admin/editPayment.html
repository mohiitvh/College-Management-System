<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Payment | Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#eef2ff,#f8fafc);
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:35px;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
    position:relative;
    overflow:hidden;
}

.container::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:5px;
    background:linear-gradient(90deg,#2563eb,#22c55e,#f59e0b);
}

h2{
    margin-bottom:25px;
    font-size:26px;
    color:#0f172a;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    font-weight:600;
    margin-bottom:6px;
    color:#334155;
    font-size:14px;
}

input,
select{
    padding:12px 14px;
    border:1px solid #e2e8f0;
    border-radius:10px;
    outline:none;
    transition:.2s;
    font-size:14px;
    background:#f8fafc;
}

input:focus,
select:focus{
    border-color:#2563eb;
    background:#fff;
    box-shadow:0 0 0 3px rgba(37,99,235,.15);
}

input[readonly]{
    background:#e5e7eb;
    cursor:not-allowed;
}

.action{
    display:flex;
    gap:12px;
    margin-top:25px;
}

.btn{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
    text-decoration:none;
    display:inline-block;
}

.save{
    background:#2563eb;
    color:white;
}

.save:hover{
    background:#1d4ed8;
}

.back{
    background:#64748b;
    color:white;
}

.back:hover{
    background:#475569;
}

.title-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.badge{
    background:#dcfce7;
    color:#166534;
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:600;
}

@media(max-width:768px){
    .form-grid{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="title-bar">
        <h2>Edit Payment</h2>
        <span class="badge">Admin Panel</span>
    </div>

    <form th:action="@{/admin/payment/update}"
          method="post"
          th:object="${payment}">

        <input type="hidden" th:field="*{id}">

        <div class="form-grid">

            <div class="form-group">
                <label>Student ID</label>
                <input type="text" th:field="*{studentId}" readonly>
            </div>

            <div class="form-group">
                <label>Student Name</label>
                <input type="text" th:field="*{studentName}" readonly>
            </div>

            <div class="form-group">
                <label>Course Name</label>
                <input type="text" th:field="*{courseName}" readonly>
            </div>

            <div class="form-group">
                <label>Total Fee</label>
                <input type="number" step="0.01" th:field="*{totalFee}">
            </div>

            <div class="form-group">
                <label>Paid Amount</label>
                <input type="number" step="0.01" th:field="*{paidAmount}">
            </div>

            <div class="form-group">
                <label>Due Amount</label>
                <input type="number" step="0.01" th:field="*{dueAmount}">
            </div>

            <div class="form-group">
                <label>Payment Mode</label>
                <select th:field="*{paymentMode}">
                    <option value="Cash">Cash</option>
                    <option value="UPI">UPI</option>
                    <option value="Card">Card</option>
                    <option value="Net Banking">Net Banking</option>
                </select>
            </div>

            <div class="form-group">
                <label>Status</label>
                <select th:field="*{paymentStatus}">
                    <option value="PENDING">PENDING</option>
                    <option value="PAID">PAID</option>
                    <option value="DUE">DUE</option>
                </select>
            </div>

        </div>

        <div class="action">
            <button type="submit" class="btn save">
                Update Payment
            </button>

            <a th:href="@{/admin/payment/list}" class="btn back">
                Back
            </a>
        </div>

    </form>

</div>

</body>
</html>
