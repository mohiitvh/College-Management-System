<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Certificate Details | Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#eef2ff,#f8fafc);
    padding:30px;
}

/* CARD */
.card{
    max-width:850px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,.08);
}

/* TITLE */
h2{
    text-align:center;
    color:#0d6efd;
    margin-bottom:25px;
    font-size:26px;
}

/* ROW */
.row{
    display:flex;
    justify-content:space-between;
    padding:14px 18px;
    border-bottom:1px solid #e5e7eb;
    transition:.3s;
}

.row:hover{
    background:#f8fafc;
}

.label{
    font-weight:600;
    color:#64748b;
}

.value{
    font-weight:600;
    color:#0f172a;
}

/* STATUS BADGE */
.status{
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:600;
}

.approved{
    background:#dcfce7;
    color:#166534;
}

.pending{
    background:#fef9c3;
    color:#854d0e;
}

.rejected{
    background:#fee2e2;
    color:#991b1b;
}

/* BUTTONS */
.btn-area{
    margin-top:30px;
    text-align:center;
}

.btn{
    display:inline-block;
    padding:12px 22px;
    text-decoration:none;
    border-radius:12px;
    color:white;
    font-weight:600;
    margin:0 8px;
    transition:.3s;
}

.approve{
    background:linear-gradient(135deg,#22c55e,#16a34a);
}

.reject{
    background:linear-gradient(135deg,#ef4444,#dc2626);
}

.back{
    background:linear-gradient(135deg,#2563eb,#4f46e5);
}

.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

/* HEADER TAG (optional) */
.header-tag{
    text-align:center;
    margin-bottom:15px;
    color:#64748b;
    font-size:14px;
}

@media(max-width:600px){
    .row{
        flex-direction:column;
        gap:5px;
    }
}

</style>

</head>

<body>

<div class="card">

    <div class="header-tag">
        Certificate Request Details
    </div>

    <h2><i class="fa-solid fa-certificate"></i> Certificate Details</h2>

    <div class="row">
        <span class="label">Student Name</span>
        <span class="value" th:text="${certificate.studentName}"></span>
    </div>

    <div class="row">
        <span class="label">Email</span>
        <span class="value" th:text="${certificate.email}"></span>
    </div>

    <div class="row">
        <span class="label">Course</span>
        <span class="value" th:text="${certificate.courseName}"></span>
    </div>

    <div class="row">
        <span class="label">Certificate Type</span>
        <span class="value" th:text="${certificate.certificateType}"></span>
    </div>

    <div class="row">
        <span class="label">Purpose</span>
        <span class="value" th:text="${certificate.purpose}"></span>
    </div>

    <div class="row">
        <span class="label">Status</span>
        <span class="value"
              th:classappend="${certificate.status=='APPROVED'} ? 'status approved' :
                             (${certificate.status=='REJECTED'} ? 'status rejected' : 'status pending')"
              th:text="${certificate.status}">
        </span>
    </div>

    <div class="row">
        <span class="label">Apply Date</span>
        <span class="value" th:text="${certificate.applyDate}"></span>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="btn-area">

        <a class="btn approve"
           th:href="@{'/certificate/approve/' + ${certificate.id}}">
            <i class="fa-solid fa-check"></i> Approve
        </a>

        <a class="btn reject"
           th:href="@{'/certificate/reject/' + ${certificate.id}}">
            <i class="fa-solid fa-xmark"></i> Reject
        </a>

		<a class="btn back"
		   th:href="@{/certificate-management}">
		    ← Back
		</a>
    </div>

</div>

</body>
</html>
