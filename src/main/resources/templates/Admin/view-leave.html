<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>View Leave | Apna College</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fc;
    padding:30px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.header{
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    margin-bottom:25px;
    text-align:center;
}

.header h1{
    color:#071952;
}

.header p{
    color:#64748b;
    margin-top:5px;
}

.card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,.08);
}

.card-title{
    background:linear-gradient(135deg,#0d6efd,#6610f2);
    color:white;
    padding:18px 25px;
    font-size:18px;
    font-weight:600;
}

.details{
    padding:25px;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:15px 0;
    border-bottom:1px solid #eee;
}

.row:last-child{
    border-bottom:none;
}

.label{
    color:#64748b;
    font-weight:500;
}

.value{
    color:#071952;
    font-weight:600;
    text-align:right;
}

.reason-box{
    margin-top:20px;
    background:#f8fafc;
    padding:20px;
    border-radius:12px;
    border-left:5px solid #0d6efd;
}

.reason-box h3{
    margin-bottom:10px;
    color:#071952;
}

.reason-box p{
    color:#475569;
    line-height:1.7;
}

.status{
    padding:8px 14px;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
}

.pending{
    background:#fff3cd;
    color:#856404;
}

.approved{
    background:#d1fae5;
    color:#065f46;
}

.rejected{
    background:#fee2e2;
    color:#991b1b;
}

.actions{
    margin-top:25px;
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;
}

.btn{
    text-decoration:none;
    color:white;
    padding:12px 22px;
    border-radius:10px;
    font-weight:600;
}

.approve-btn{
    background:#10b981;
}

.reject-btn{
    background:#ef4444;
}

.back-btn{
    background:#2563eb;
}

.btn:hover{
    opacity:.9;
}

@media(max-width:768px){

.row{
    flex-direction:column;
    gap:6px;
}

.value{
    text-align:left;
}

}

</style>
</head>

<body>

<div class="container">

<div class="header">
    <h1>Leave Application Details</h1>
    <p>Review Leave Request</p>
</div>

<div class="card">

<div class="card-title">
    Leave Information
</div>

<div class="details">

<div class="row">
    <div class="label">Leave ID</div>
    <div class="value" th:text="${leave.id}"></div>
</div>

<div class="row">
    <div class="label">Applicant Name</div>
    <div class="value" th:text="${leave.name}"></div>
</div>

<div class="row">
    <div class="label">Role</div>
    <div class="value" th:text="${leave.role}"></div>
</div>

<div class="row">
    <div class="label">Leave Type</div>
    <div class="value" th:text="${leave.leaveType}"></div>
</div>

<div class="row">
    <div class="label">From Date</div>
    <div class="value" th:text="${leave.fromDate}"></div>
</div>

<div class="row">
    <div class="label">To Date</div>
    <div class="value" th:text="${leave.toDate}"></div>
</div>

<div class="row">
    <div class="label">Applied On</div>
    <div class="value" th:text="${leave.appliedDate}"></div>
</div>

<div class="row">

<div class="label">Status</div>

<div class="value">

<span th:if="${leave.status=='Pending'}"
      class="status pending">
      Pending
</span>

<span th:if="${leave.status=='Approved'}"
      class="status approved">
      Approved
</span>

<span th:if="${leave.status=='Rejected'}"
      class="status rejected">
      Rejected
</span>

</div>

</div>

<div class="reason-box">
    <h3>Leave Reason</h3>

    <p th:text="${leave.reason}">
        Reason Here...
    </p>
</div>

<div class="actions">

<a th:href="@{/admin/leave/approve/{id}(id=${leave.id})}"
   class="btn approve-btn">
   Approve
</a>

<a th:href="@{/admin/leave/reject/{id}(id=${leave.id})}"
   class="btn reject-btn">
   Reject
</a>


<a th:href="@{/allLeaves}"
   class="btn back-btn">
   Back
</a>

</div>

</div>

</div>

</div>

</body>
</html>
