<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports Management</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#eef2ff,#f8fafc);
padding:30px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.header h1{
font-size:30px;
font-weight:800;
color:#0f172a;
}

.back-btn{
text-decoration:none;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
padding:10px 18px;
border-radius:12px;
font-weight:600;
box-shadow:0 10px 25px rgba(37,99,235,.25);
transition:.3s;
}

.back-btn:hover{
transform:translateY(-3px);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
margin-top:20px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.4);
padding:30px;
border-radius:18px;
text-align:center;
box-shadow:0 12px 30px rgba(0,0,0,.08);
transition:.3s;
position:relative;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:5px;
background:linear-gradient(90deg,#2563eb,#22c55e,#f59e0b);
}

.card:hover{
transform:translateY(-8px);
}

/* ICON */
.card i{
font-size:42px;
color:#2563eb;
margin-bottom:15px;
}

/* VALUE */
.card h2{
font-size:34px;
color:#0f172a;
font-weight:800;
}

/* LABEL */
.card p{
color:#64748b;
margin-top:5px;
font-size:14px;
}

/* FOOTER NOTE */
.footer{
margin-top:30px;
text-align:center;
color:#64748b;
font-size:13px;
}

@media(max-width:768px){
.header{
flex-direction:column;
align-items:flex-start;
gap:10px;
}
}

</style>
</head>

<body>

<div class="header">

<h1>
<i class="fa-solid fa-chart-line"></i>
 Reports Dashboard
</h1>

<a th:href="@{/indexAdmin}" class="back-btn">
<i class="fa-solid fa-arrow-left"></i>
 Back
</a>

</div>

<div class="grid">

<div class="card">
<i class="fa-solid fa-user-graduate"></i>
<h2 th:text="${studentCount}">0</h2>
<p>Total Students</p>
</div>

<div class="card">
<i class="fa-solid fa-file-signature"></i>
<h2 th:text="${admissionCount}">0</h2>
<p>Total Admissions</p>
</div>

<div class="card">
<i class="fa-solid fa-indian-rupee-sign"></i>
<h2>Reports</h2>
<p>Analytics Overview</p>
</div>

</div>

<div class="footer">
© 2026 College Management System | Reports Module
</div>

</body>
</html>
