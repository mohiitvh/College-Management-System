<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment List | Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#eef2ff,#f8fafc);
padding:30px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.header h2{
font-size:26px;
color:#0f172a;
font-weight:700;
}

.btn{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
padding:10px 18px;
text-decoration:none;
border-radius:10px;
font-size:14px;
font-weight:600;
transition:.3s;
box-shadow:0 8px 20px rgba(37,99,235,.2);
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 12px 25px rgba(37,99,235,.3);
}

/* TABLE BOX */
.table-box{
background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);
padding:20px;
border-radius:18px;
box-shadow:0 12px 30px rgba(0,0,0,.08);
overflow-x:auto;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

thead{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

th{
padding:15px;
text-align:left;
font-size:14px;
}

td{
padding:14px;
border-bottom:1px solid #e5e7eb;
font-size:14px;
color:#0f172a;
}

tbody tr:hover{
background:#f8fafc;
}

/* STATUS */
.status-paid{
color:#16a34a;
font-weight:700;
}

.status-pending{
color:#f59e0b;
font-weight:700;
}

.status-due{
color:#ef4444;
font-weight:700;
}

/* ACTION BUTTONS */
.action-btn{
padding:7px 10px;
border-radius:8px;
text-decoration:none;
font-size:13px;
color:white;
margin-right:5px;
display:inline-flex;
align-items:center;
justify-content:center;
transition:.3s;
}

.action-btn:hover{
transform:scale(1.1);
}

.view{ background:#0ea5e9; }
.edit{ background:#16a34a; }
.delete{ background:#ef4444; }
.receipt{ background:#7c3aed; }

.no-data{
text-align:center;
padding:25px;
color:#64748b;
font-weight:600;
}

@media(max-width:768px){
.header{
flex-direction:column;
align-items:flex-start;
gap:10px;
}
}

</style>
</head>

<body>

<div class="header">

<h2>
<i class="fa-solid fa-list"></i>
 Payment List
</h2>

<a th:href="@{/admin/payment/dashboard}" class="btn">
<i class="fa-solid fa-arrow-left"></i> Dashboard
</a>

</div>

<div class="table-box">

<table>

<thead>
<tr>
<th>ID</th>
<th>Student ID</th>
<th>Name</th>
<th>Course</th>
<th>Total</th>
<th>Paid</th>
<th>Due</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody>

<tr th:if="${#lists.isEmpty(payments)}">
<td colspan="9" class="no-data">
No Payment Records Found
</td>
</tr>

<tr th:each="payment : ${payments}">

<td th:text="${payment.id}"></td>
<td th:text="${payment.studentId}"></td>
<td th:text="${payment.studentName}"></td>
<td th:text="${payment.courseName}"></td>

<td>₹ <span th:text="${payment.totalFee}"></span></td>
<td>₹ <span th:text="${payment.paidAmount}"></span></td>
<td>₹ <span th:text="${payment.dueAmount}"></span></td>

<td>
<span th:if="${payment.paymentStatus=='PAID'}" class="status-paid">PAID</span>
<span th:if="${payment.paymentStatus=='PENDING'}" class="status-pending">PENDING</span>
<span th:if="${payment.paymentStatus=='DUE'}" class="status-due">DUE</span>
</td>

<td>

<a th:href="@{/admin/payment/details/{id}(id=${payment.id})}" class="action-btn view">
<i class="fa-solid fa-eye"></i>
</a>

<a th:href="@{/admin/payment/edit/{id}(id=${payment.id})}" class="action-btn edit">
<i class="fa-solid fa-pen"></i>
</a>

<a th:href="@{/admin/payment/delete/{id}(id=${payment.id})}" class="action-btn delete"
onclick="return confirm('Delete Payment?')">
<i class="fa-solid fa-trash"></i>
</a>

<a th:href="@{/receipt/{id}(id=${payment.id})}" class="action-btn receipt" target="_blank">
<i class="fa-solid fa-file-invoice"></i>
</a>

</td>

</tr>

</tbody>

</table>

</div>

</body>
</html>
