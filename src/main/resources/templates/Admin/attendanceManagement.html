<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Management</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fc;
    padding:30px;
}

.container{
    max-width:1400px;
    margin:auto;
}

.header{
    background:#fff;
    padding:25px;
    border-radius:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    margin-bottom:25px;
}

.header h2{
    color:#071952;
}

.back-btn{
    text-decoration:none;
    background:#0d6efd;
    color:white;
    padding:12px 20px;
    border-radius:10px;
    font-weight:600;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.filters{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.filters select,
.filters input{
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
}

.filters button{
    background:#0d6efd;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#0d6efd;
}

thead th{
    color:white;
    padding:15px;
    text-align:left;
}

tbody td{
    padding:15px;
    border-bottom:1px solid #eee;
}

tbody tr:hover{
    background:#f8fbff;
}

.present{
    background:#d1fae5;
    color:#065f46;
    padding:8px 15px;
    border-radius:20px;
    font-weight:600;
}

.absent{
    background:#fee2e2;
    color:#991b1b;
    padding:8px 15px;
    border-radius:20px;
    font-weight:600;
}

.leave{
    background:#fff3cd;
    color:#856404;
    padding:8px 15px;
    border-radius:20px;
    font-weight:600;
}

.save-btn{
    margin-top:20px;
    background:#10b981;
    color:white;
    border:none;
    padding:14px 30px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
}

@media(max-width:768px){

    .header{
        flex-direction:column;
        gap:15px;
    }

    table{
        min-width:1000px;
    }
}

</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h2>Attendance Management</h2>

        <a th:href="@{/indexAdmin}" class="back-btn">
            Back Dashboard
        </a>
    </div>

    <div class="card">

        <form>

            <div class="filters">

                <input type="date" name="attendanceDate">

                <select name="course">
                    <option>Select Course</option>
                    <option>BCA</option>
                    <option>MCA</option>
                    <option>BBA</option>
                    <option>MBA</option>
                </select>

                <select name="semester">
                    <option>Semester</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                </select>

                <button type="submit">
                    Load Students
                </button>

            </div>

        </form>

        <table>

            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Course</th>
                <th>Semester</th>
                <th>Attendance</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="student : ${students}">

                <td th:text="${student.id}"></td>

                <td th:text="${student.fullName}"></td>

                <td th:text="${student.course.courseName}"></td>

                <td>1</td>

                <td>

                    <select name="status">

                        <option value="Present">
                            Present
                        </option>

                        <option value="Absent">
                            Absent
                        </option>

                        <option value="Leave">
                            Leave
                        </option>

                    </select>

                </td>

            </tr>

            </tbody>

        </table>

        <button class="save-btn">
            Save Attendance
        </button>

    </div>

</div>

</body>
</html>
