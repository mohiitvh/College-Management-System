<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leave History | Student Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7ff;
}

/* HEADER */
.header{
    background:linear-gradient(135deg,#0d6efd,#6610f2);
    color:white;
    padding:40px 25px;
    border-radius:0 0 30px 30px;
}

.header-container{
    max-width:1200px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;
}

.header h2{
    font-size:30px;
}

.header p{
    opacity:0.9;
    font-size:14px;
}

.back-btn{
    text-decoration:none;
    background:white;
    color:#0d6efd;
    padding:10px 18px;
    border-radius:12px;
    font-weight:600;
    transition:0.3s;
}

.back-btn:hover{
    transform:translateY(-2px);
}

/* CONTAINER */
.container{
    max-width:1200px;
    margin:30px auto;
    padding:0 20px;
}

/* CARD */
.table-card{
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:linear-gradient(135deg,#0d6efd,#6610f2);
}

thead th{
    color:white;
    padding:18px;
    text-align:left;
    font-size:14px;
}

tbody td{
    padding:16px;
    border-bottom:1px solid #f1f5f9;
    color:#475569;
    font-size:14px;
}

tbody tr:hover{
    background:#f8fbff;
}

/* STATUS */
.status{
    padding:7px 14px;
    border-radius:20px;
    font-size:12px;
    font-weight:600;
    display:inline-block;
}

.pending{
    background:#fff7cc;
    color:#92400e;
}

.approved{
    background:#dcfce7;
    color:#166534;
}

.rejected{
    background:#fee2e2;
    color:#991b1b;
}

/* VIEW BUTTON */
.view-btn{
    text-decoration:none;
    background:linear-gradient(135deg,#0d6efd,#6610f2);
    color:white;
    padding:8px 14px;
    border-radius:10px;
    font-size:12px;
    font-weight:600;
    transition:0.3s;
    display:inline-block;
}

.view-btn:hover{
    transform:translateY(-2px);
}

/* EMPTY */
.no-record{
    text-align:center;
    padding:50px;
    color:#64748b;
}

/* RESPONSIVE */
@media(max-width:768px){

    table{
        min-width:900px;
    }

}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

    <div class="header-container">

        <div>
            <h2><i class="fa-solid fa-clock-rotate-left"></i> Leave History</h2>
            <p>Track all your submitted leave applications</p>
        </div>

        <a th:href="@{/indexStudent}" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Back
        </a>

    </div>

</div>

<!-- TABLE -->
<div class="container">

<div class="table-card">

<table>

<thead>
<tr>
    <th>ID</th>
    <th>Leave Type</th>
    <th>From</th>
    <th>To</th>
    <th>Days</th>
    <th>Applied Date</th>
    <th>Status</th>
    <th>Action</th>
</tr>
</thead>

<tbody>

<tr th:if="${#lists.isEmpty(leaves)}">
    <td colspan="8" class="no-record">
        <i class="fa-solid fa-folder-open"></i><br><br>
        No Leave Records Found
    </td>
</tr>

<tr th:each="leave : ${leaves}">

    <td th:text="${leave.id}"></td>
    <td th:text="${leave.leaveType}"></td>
    <td th:text="${leave.fromDate}"></td>
    <td th:text="${leave.toDate}"></td>
    <td th:text="${leave.totalDays}"></td>
    <td th:text="${leave.appliedDate}"></td>

    <td>
        <span th:if="${leave.status=='Pending'}" class="status pending">Pending</span>
        <span th:if="${leave.status=='Approved'}" class="status approved">Approved</span>
        <span th:if="${leave.status=='Rejected'}" class="status rejected">Rejected</span>
    </td>

    <td>
        <a th:href="@{/student/leave-details/{id}(id=${leave.id})}" class="view-btn">
            View
        </a>
    </td>

</tr>

</tbody>

</table>

</div>

</div>

</body>
</html>
