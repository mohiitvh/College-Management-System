<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Profile | Apna College</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a);
min-height:100vh;
padding:40px 20px;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:white;
border-radius:30px;
overflow:hidden;
box-shadow:0 25px 60px rgba(0,0,0,.15);
}

/* HEADER */

.header{
background:linear-gradient(135deg,#2563eb,#0ea5e9);
padding:40px;
color:white;
text-align:center;
position:relative;
}

.header h1{
font-size:32px;
font-weight:700;
}

.header p{
margin-top:8px;
opacity:.9;
}

/* PROFILE TOP */

.profile-top{
padding:40px;
display:flex;
align-items:center;
gap:35px;
flex-wrap:wrap;
border-bottom:1px solid #eee;
}

/* PHOTO */

.photo-box{
position:relative;
}

.photo-box img{
width:180px;
height:180px;
border-radius:50%;
object-fit:cover;
border:6px solid #2563eb;
box-shadow:0 15px 40px rgba(37,99,235,.3);
background:#f1f5f9;
}

.online{
position:absolute;
bottom:15px;
right:15px;
width:20px;
height:20px;
background:#22c55e;
border-radius:50%;
border:3px solid white;
}

/* INFO */

.profile-info h2{
font-size:32px;
color:#1e293b;
margin-bottom:10px;
}

.profile-info p{
color:#64748b;
margin-bottom:8px;
}

.badges{
display:flex;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
}

.badge{
padding:8px 18px;
border-radius:30px;
font-size:14px;
font-weight:600;
}

.course{
background:#dbeafe;
color:#2563eb;
}

.program{
background:#dcfce7;
color:#16a34a;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:25px;
padding:40px;
}

.box{
background:#f8fafc;
padding:25px;
border-radius:20px;
border:1px solid #e2e8f0;
transition:.3s;
}

.box:hover{
transform:translateY(-5px);
}

.box h3{
margin-bottom:20px;
color:#2563eb;
font-size:20px;
}

.row{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #e5e7eb;
}

.label{
font-weight:500;
color:#64748b;
}

.value{
font-weight:600;
color:#111827;
}

/* BUTTONS */

.buttons{
display:flex;
justify-content:center;
gap:20px;
padding:30px;
flex-wrap:wrap;
}

.btn{
padding:14px 30px;
border-radius:40px;
text-decoration:none;
font-weight:600;
transition:.3s;
}

.dashboard{
background:#2563eb;
color:white;
}

.dashboard:hover{
background:#1d4ed8;
}

.home{
background:#16a34a;
color:white;
}

.home:hover{
background:#15803d;
}

/* RESPONSIVE */

@media(max-width:768px){

.profile-top{
justify-content:center;
text-align:center;
}

.profile-info{
width:100%;
}

.profile-info h2{
font-size:26px;
}

.photo-box img{
width:150px;
height:150px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="card">

    <!-- HEADER -->

    <div class="header">
        <h1>APNA COLLEGE</h1>
        <p>Student Profile Dashboard</p>
    </div>

    <!-- PROFILE SECTION -->

    <div class="profile-top">

        <div class="photo-box">

            <img th:src="@{'/student/photo/' + ${student.id}}"
                 alt="Student Photo">

            <span class="online"></span>

        </div>

        <div class="profile-info">

            <h2 th:text="${student.name}">
                Student Name
            </h2>

            <p>
                <i class="fa-solid fa-id-card"></i>
                Student ID :
                <span th:text="${student.id}"></span>
            </p>

            <p>
                <i class="fa-solid fa-envelope"></i>
                <span th:text="${student.email}"></span>
            </p>

            <p>
                <i class="fa-solid fa-phone"></i>
                <span th:text="${student.phone}"></span>
            </p>

            <div class="badges">

                <span class="badge course"
                      th:text="${student.course}">
                </span>

                <span class="badge program"
                      th:text="${student.programType}">
                </span>

            </div>

        </div>

    </div>

    <!-- DETAILS -->

    <div class="grid">

        <div class="box">

            <h3>
                <i class="fa-solid fa-user"></i>
                Personal Information
            </h3>

            <div class="row">
                <span class="label">Full Name</span>
                <span class="value"
                      th:text="${student.name}">
                </span>
            </div>

            <div class="row">
                <span class="label">Email</span>
                <span class="value"
                      th:text="${student.email}">
                </span>
            </div>

            <div class="row">
                <span class="label">Phone</span>
                <span class="value"
                      th:text="${student.phone}">
                </span>
            </div>

        </div>

        <div class="box">

            <h3>
                <i class="fa-solid fa-graduation-cap"></i>
                Academic Information
            </h3>

            <div class="row">
                <span class="label">Student ID</span>
                <span class="value"
                      th:text="${student.id}">
                </span>
            </div>

            <div class="row">
                <span class="label">Program Type</span>
                <span class="value"
                      th:text="${student.programType}">
                </span>
            </div>

            <div class="row">
                <span class="label">Course</span>
                <span class="value"
                      th:text="${student.course}">
                </span>
            </div>

        </div>

    </div>

    <!-- BUTTONS -->

    <div class="buttons">

        <a th:href="@{/indexStudent}"
           class="btn dashboard">
            <i class="fa-solid fa-gauge"></i>
            Dashboard
        </a>

        <a th:href="@{/}"
           class="btn home">
            <i class="fa-solid fa-house"></i>
            Home
        </a>

    </div>

</div>

</div>

</body>
</html>
