<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admission Profile | Apna College</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7ff;
padding:40px;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:#fff;
border-radius:25px;
box-shadow:0 20px 60px rgba(0,0,0,.08);
overflow:hidden;
}

/* HEADER */
.header{
background:linear-gradient(135deg,#1e3a8a,#2563eb);
color:white;
padding:30px;
text-align:center;
}

.header h1{
font-size:28px;
}

/* PROFILE */
.profile{
padding:30px;
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:20px;
border-bottom:1px solid #eee;
}

.profile h2{
color:#1e3a8a;
}

.badge{
background:#dcfce7;
color:#16a34a;
padding:6px 14px;
border-radius:20px;
font-weight:600;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:30px;
}

.box{
background:#f8fafc;
padding:20px;
border-radius:15px;
border:1px solid #e5e7eb;
}

.box h3{
color:#2563eb;
margin-bottom:15px;
font-size:18px;
}

.row{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #eee;
}

.label{
color:#6b7280;
}

.value{
font-weight:600;
color:#111827;
}

/* BUTTON */
.back{
display:block;
text-align:center;
margin:30px;
padding:14px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:25px;
font-weight:600;
}

.back:hover{
background:#1e40af;
}

</style>
</head>

<body>

<div class="container">
<div class="card">

<!-- HEADER -->
<div class="header">
<h1>APNA COLLEGE</h1>
<p>Admission Profile Details</p>
</div>

<!-- PROFILE TOP -->
<div class="profile">

<div>
<h2 th:text="${admission.fullName}">Student Name</h2>
<p>ID: <span th:text="${admission.id}"></span></p>
</div>

<div class="badge">
<span th:text="${admission.selectedCourse}">Course</span>
</div>

</div>

<!-- GRID -->
<div class="grid">

<!-- PERSONAL -->
<div class="box">
<h3><i class="fa fa-user"></i> Personal</h3>

<div class="row"><span class="label">DOB</span>
<span class="value" th:text="${admission.dateOfBirth}"></span></div>

<div class="row"><span class="label">Gender</span>
<span class="value" th:text="${admission.gender}"></span></div>

<div class="row"><span class="label">Category</span>
<span class="value" th:text="${admission.category}"></span></div>

<div class="row"><span class="label">Aadhaar</span>
<span class="value" th:text="${admission.aadhaarNumber}"></span></div>

</div>

<!-- GUARDIAN -->
<div class="box">
<h3><i class="fa fa-users"></i> Guardian</h3>

<div class="row"><span class="label">Father</span>
<span class="value" th:text="${admission.fatherName}"></span></div>

<div class="row"><span class="label">Mother</span>
<span class="value" th:text="${admission.motherName}"></span></div>

<div class="row"><span class="label">Guardian</span>
<span class="value" th:text="${admission.guardianName}"></span></div>

</div>

<!-- CONTACT -->
<div class="box">
<h3><i class="fa fa-phone"></i> Contact</h3>

<div class="row"><span class="label">Mobile</span>
<span class="value" th:text="${admission.mobileNumber}"></span></div>

<div class="row"><span class="label">Email</span>
<span class="value" th:text="${admission.emailId}"></span></div>

<div class="row"><span class="label">Address</span>
<span class="value" th:text="${admission.currentAddress}"></span></div>

</div>

<!-- ACADEMIC -->
<div class="box">
<h3><i class="fa fa-graduation-cap"></i> Academic</h3>

<div class="row"><span class="label">School</span>
<span class="value" th:text="${admission.previousSchoolCollege}"></span></div>

<div class="row"><span class="label">Board</span>
<span class="value" th:text="${admission.boardUniversity}"></span></div>

<div class="row"><span class="label">Marks</span>
<span class="value" th:text="${admission.marksPercentageCgpa}"></span></div>

</div>

<!-- ADMISSION -->
<div class="box">
<h3><i class="fa fa-book"></i> Admission</h3>

<div class="row"><span class="label">UG/PG</span>
<span class="value" th:text="${admission.ug_pg}"></span></div>

<div class="row"><span class="label">Course</span>
<span class="value" th:text="${admission.selectedCourse}"></span></div>

<div class="row"><span class="label">Session</span>
<span class="value" th:text="${admission.sessionBatch}"></span></div>

</div>

</div>

<!-- BACK -->
<div style="display:flex;gap:15px;padding:20px;">
    <a th:href="@{/}" class="back">
        ← Back to Home
    </a>

    <a th:href="@{/indexStudent}" class="back">
        Save
    </a>
</div>

</div>
</div>

</body>
</html>
