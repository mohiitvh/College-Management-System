<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student ID Card</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

	*{
	margin:0;
	padding:0;
	box-sizing:border-box;
	font-family:'Poppins',sans-serif;
	}

	body{
	min-height:100vh;
	display:flex;
	justify-content:center;
	align-items:center;
	padding:20px;
	background:linear-gradient(135deg,#0d6efd,#6610f2);
	}

	.id-card{
	width:430px;
	background:#fff;
	border-radius:30px;
	overflow:hidden;
	position:relative;
	box-shadow:0 25px 60px rgba(0,0,0,.25);
	}

	.id-card::before{
	content:'';
	position:absolute;
	top:0;
	left:-120%;
	width:60%;
	height:100%;
	background:rgba(255,255,255,.18);
	transform:skewX(-25deg);
	animation:shine 6s infinite;
	}

	@keyframes shine{
	0%{
	left:-120%;
	}
	100%{
	left:150%;
	}
	}

	/* Header */

	.top{
	background:linear-gradient(
	135deg,
	#071952,
	#0d6efd,
	#6610f2
	);
	padding:35px;
	text-align:center;
	color:white;
	position:relative;
	overflow:hidden;
	}

	.top::before{
	content:'';
	position:absolute;
	width:220px;
	height:220px;
	background:rgba(255,255,255,.08);
	border-radius:50%;
	top:-100px;
	right:-60px;
	}

	.college-logo{
	width:85px;
	height:85px;
	background:white;
	padding:6px;
	border-radius:50%;
	object-fit:contain;
	margin-bottom:12px;
	position:relative;
	z-index:2;
	}

	.top h2{
	font-size:30px;
	font-weight:700;
	position:relative;
	z-index:2;
	}

	.top p{
	font-size:13px;
	opacity:.9;
	margin-top:5px;
	position:relative;
	z-index:2;
	}

	/* Photo Section */

	.photo-box{
	display:flex;
	justify-content:center;
	padding:25px 0;
	background:white;
	}

	.photo-frame{
	width:150px;
	height:150px;
	padding:6px;
	border-radius:50%;
	background:linear-gradient(
	135deg,
	#0d6efd,
	#6610f2,
	#00c6ff
	);
	box-shadow:
	0 10px 30px rgba(13,110,253,.35),
	0 0 20px rgba(102,16,242,.25);
	}

	.photo{
	width:100%;
	height:100%;
	border-radius:50%;
	object-fit:cover;
	border:5px solid white;
	display:block;
	}

	/* Name */

	.student-name{
	text-align:center;
	padding:10px 20px 20px;
	}

	.student-name h3{
	font-size:26px;
	font-weight:700;
	color:#071952;
	margin-bottom:8px;
	}

	.student-name span{
	display:inline-block;
	padding:6px 18px;
	background:#eef4ff;
	color:#0d6efd;
	border-radius:30px;
	font-weight:600;
	}

	/* Info */

	.info{
	padding:0 30px 20px;
	}

	.row{
	display:flex;
	justify-content:space-between;
	align-items:center;
	padding:14px 0;
	border-bottom:1px dashed #d9d9d9;
	}

	.label{
	font-weight:600;
	color:#64748b;
	}

	.value{
	font-weight:700;
	color:#111827;
	}

	/* Footer */

	.bottom{
	padding:20px 30px;
	display:flex;
	justify-content:space-between;
	align-items:center;
	}

	.qr{
	width:90px;
	height:90px;
	border-radius:15px;
	background:#f8fafc;
	border:2px dashed #cbd5e1;
	display:flex;
	justify-content:center;
	align-items:center;
	font-size:12px;
	font-weight:600;
	color:#475569;
	}

	.sign{
	text-align:center;
	}

	.sign-line{
	width:140px;
	height:2px;
	background:#111827;
	margin-bottom:8px;
	}

	.footer{
	background:#f8fafc;
	text-align:center;
	padding:12px;
	font-size:12px;
	color:#64748b;
	font-weight:500;
	}

	/* Button */

	.print-btn{
	width:100%;
	padding:16px;
	border:none;
	background:linear-gradient(
	135deg,
	#0d6efd,
	#6610f2
	);
	color:white;
	font-size:16px;
	font-weight:700;
	cursor:pointer;
	transition:.3s;
	}

	.print-btn:hover{
	transform:translateY(-2px);
	}

	/* Print */

	@media print{

	body{
	background:white;
	padding:0;
	}

	.print-btn{
	display:none;
	}

	.id-card{
	box-shadow:none;
	border:1px solid #ddd;
	}

	}

</style>

</head>

<body>

<div class="id-card">

    <!-- Header -->

    <div class="top">

        <img th:src="@{/images/apnacollegLogo.png}"
             class="college-logo">

        <h2>APNA COLLEGE</h2>

        <p>Official Student Identity Card</p>

    </div>

    <!-- Student Photo -->

	<div class="photo-box">

	    <div class="photo-frame">

	        <img th:src="@{'/student/photo/' + ${student.id}}"
	             class="photo"
	             alt="Student Photo">

	    </div>

	</div>

    <!-- Student Name -->

    <div class="student-name">

        <h3 th:text="${student.name}">
            Student Name
        </h3>

        <span th:text="${student.course}">
            BCA
        </span>

    </div>

    <!-- Student Details -->

    <div class="info">

        <div class="row">
            <div class="label">Student ID</div>
            <div class="value" th:text="${student.id}">
                1001
            </div>
        </div>


        <div class="row">
            <div class="label">Program</div>
            <div class="value" th:text="${student.programType}">
                UG
            </div>
        </div>

        <div class="row">
            <div class="label">Course</div>
            <div class="value" th:text="${student.course}">
                BCA
            </div>
        </div>

        <div class="row">
            <div class="label">Phone</div>
            <div class="value" th:text="${student.phone}">
                9876543210
            </div>
        </div>

        <div class="row">
            <div class="label">Email</div>
            <div class="value" th:text="${student.email}">
                student@gmail.com
            </div>
        </div>

    </div>

    <!-- Footer -->

    <div class="bottom">

        <div class="qr">
            QR CODE
        </div>

        <div class="sign">

            <div class="sign-line"></div>

            Principal

        </div>

    </div>

    <div class="footer">
        Valid Till Course Completion
    </div>

    <button class="print-btn"
            onclick="window.print()">
        Print / Download ID Card
    </button>

</div>

</body>
</html>
