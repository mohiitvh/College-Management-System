<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student ID Card</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(135deg,#0d6efd,#6610f2);
}

.id-card{
width:430px;
background:#fff;
border-radius:25px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,.25);
}

/* Header */

.top{
background:linear-gradient(135deg,#0d6efd,#003f88);
padding:30px;
text-align:center;
color:white;
}

.college-logo{
width:80px;
height:80px;
background:white;
padding:6px;
border-radius:50%;
object-fit:contain;
margin-bottom:10px;
}

.top h2{
font-size:28px;
font-weight:700;
}

.top p{
font-size:13px;
opacity:.9;
margin-top:5px;
}

/* Photo */

.photo-box{
display:flex;
justify-content:center;
padding:20px 0 10px;
background:white;
}

.photo{
width:120px;
height:120px;
border-radius:50%;
border:5px solid #0d6efd;
object-fit:cover;
background:#eee;
}

/* Name */

.student-name{
text-align:center;
padding:10px 20px 20px;
}

.student-name h3{
font-size:24px;
color:#222;
margin-bottom:5px;
}

.student-name span{
color:#0d6efd;
font-weight:600;
font-size:15px;
}

/* Info */

.info{
padding:0 30px 20px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 0;
border-bottom:1px solid #eee;
}

.label{
font-weight:600;
color:#555;
}

.value{
color:#111;
font-weight:500;
}

/* Footer */

.bottom{
padding:20px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.qr{
width:85px;
height:85px;
border:1px solid #ddd;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
font-size:12px;
color:#666;
}

.sign{
text-align:center;
}

.sign-line{
width:130px;
height:1px;
background:#000;
margin-bottom:5px;
}

.footer{
background:#f8f9fa;
text-align:center;
padding:10px;
font-size:12px;
color:#666;
}

/* Button */

.print-btn{
width:100%;
padding:15px;
border:none;
background:linear-gradient(135deg,#0d6efd,#6610f2);
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.print-btn:hover{
opacity:.95;
}

/* Print */

@media print{

body{
background:white;
padding:0;
}

.print-btn{
display:none;
}

.id-card{
box-shadow:none;
border:1px solid #ddd;
}

}

</style>

</head>

<body>

<div class="id-card">

    <!-- Header -->

    <div class="top">

        <img th:src="@{/images/apnacollegLogo.png}"
             class="college-logo">

        <h2>APNA COLLEGE</h2>

        <p>Official Student Identity Card</p>

    </div>

    <!-- Student Photo -->

    <div class="photo-box">

        <img class="photo"
             src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

    </div>

    <!-- Student Name -->

    <div class="student-name">

        <h3 th:text="${student.name}">
            Student Name
        </h3>

        <span th:text="${student.course}">
            BCA
        </span>

    </div>

    <!-- Student Details -->

    <div class="info">

        <div class="row">
            <div class="label">Student ID</div>
            <div class="value" th:text="${student.id}">
                1001
            </div>
        </div>

        <div class="row">
            <div class="label">Roll No</div>
            <div class="value" th:text="${student.rollno}">
                BCA001
            </div>
        </div>

        <div class="row">
            <div class="label">Program</div>
            <div class="value" th:text="${student.programType}">
                UG
            </div>
        </div>

        <div class="row">
            <div class="label">Course</div>
            <div class="value" th:text="${student.course}">
                BCA
            </div>
        </div>

        <div class="row">
            <div class="label">Phone</div>
            <div class="value" th:text="${student.phone}">
                9876543210
            </div>
        </div>

        <div class="row">
            <div class="label">Email</div>
            <div class="value" th:text="${student.email}">
                student@gmail.com
            </div>
        </div>

    </div>

    <!-- Footer -->

    <div class="bottom">

        <div class="qr">
            QR CODE
        </div>

        <div class="sign">

            <div class="sign-line"></div>

            Principal

        </div>

    </div>

    <div class="footer">
        Valid Till Course Completion
    </div>

    <button class="print-btn"
            onclick="window.print()">
        Print / Download ID Card
    </button>

</div>

</body>
</html>
