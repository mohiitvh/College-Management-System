<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fee Details | Apna College</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
    padding:30px;
}

/* MAIN CONTAINER */

.container{
    max-width:1200px;
    margin:auto;
}

/* HEADER */

.header{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:25px;
    padding:35px;
    text-align:center;
    margin-bottom:25px;
    box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.header-icon{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#3b82f6,#2563eb);
    color:white;
    font-size:38px;
    margin-bottom:15px;
}

.header h2{
    color:white;
    font-size:32px;
    margin-bottom:8px;
}

.header p{
    color:#cbd5e1;
}

/* SUMMARY */

.summary{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.summary-card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:20px;
    padding:25px;
    text-align:center;
}

.summary-card i{
    font-size:30px;
    color:#60a5fa;
    margin-bottom:12px;
}

.summary-card h4{
    color:#cbd5e1;
    margin-bottom:10px;
}

.summary-card h2{
    color:white;
    font-size:28px;
}

/* DETAILS CARD */

.card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:25px;
    padding:30px;
    box-shadow:0 20px 50px rgba(0,0,0,.35);
}

/* GRID */

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
}

.item{
    background:rgba(255,255,255,.08);
    border-radius:18px;
    padding:20px;
    transition:.3s;
}

.item:hover{
    transform:translateY(-5px);
}

.item h4{
    color:#94a3b8;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:.5px;
    margin-bottom:8px;
}

.item p{
    color:white;
    font-size:19px;
    font-weight:600;
}

/* STATUS */

.status{
    display:inline-block;
    padding:8px 18px;
    border-radius:30px;
    color:white;
    font-size:13px;
    font-weight:700;
}

.paid{
    background:#22c55e;
}

.pending{
    background:#f59e0b;
}

.due{
    background:#ef4444;
}

/* ACTIONS */

.actions{
    margin-top:35px;
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.btn{
    text-decoration:none;
    padding:14px 24px;
    border-radius:12px;
    font-weight:600;
    transition:.3s;
}

.receipt-btn{
    background:linear-gradient(135deg,#10b981,#22c55e);
    color:white;
    box-shadow:0 10px 25px rgba(34,197,94,.4);
}

.back-btn{
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.2);
    color:white;
}

.btn:hover{
    transform:translateY(-4px);
}

/* MOBILE */

@media(max-width:768px){

    body{
        padding:15px;
    }

    .header h2{
        font-size:26px;
    }

    .btn{
        width:100%;
        text-align:center;
    }

    .actions{
        flex-direction:column;
    }
}

</style>

</head>

<body>

<div class="container">

    <!-- HEADER -->

    <div class="header">

        <div class="header-icon">
            <i class="fa-solid fa-file-invoice-dollar"></i>
        </div>

        <h2>Fee Details</h2>

        <p>Complete fee structure and payment information</p>

    </div>

    <!-- SUMMARY CARDS -->

    <div class="summary">

        <div class="summary-card">
            <i class="fa-solid fa-money-bill-wave"></i>
            <h4>Total Fee</h4>
            <h2>₹ <span th:text="${payment.totalFee}"></span></h2>
        </div>

        <div class="summary-card">
            <i class="fa-solid fa-circle-check"></i>
            <h4>Paid Amount</h4>
            <h2>₹ <span th:text="${payment.paidAmount}"></span></h2>
        </div>

        <div class="summary-card">
            <i class="fa-solid fa-clock"></i>
            <h4>Due Amount</h4>
            <h2>₹ <span th:text="${payment.dueAmount}"></span></h2>
        </div>

    </div>

    <!-- DETAILS -->

    <div class="card">

        <div class="grid">

            <div class="item">
                <h4>Student ID</h4>
                <p th:text="${payment.studentId}"></p>
            </div>

            <div class="item">
                <h4>Student Name</h4>
                <p th:text="${payment.studentName}"></p>
            </div>

            <div class="item">
                <h4>Course</h4>
                <p th:text="${payment.courseName}"></p>
            </div>

            <div class="item">
                <h4>Admission Fee</h4>
                <p>₹ <span th:text="${payment.admissionFee}"></span></p>
            </div>

            <div class="item">
                <h4>Semester Fee</h4>
                <p>₹ <span th:text="${payment.semesterFee}"></span></p>
            </div>

            <div class="item">
                <h4>Payment Status</h4>

                <span th:text="${payment.paymentStatus}"
                      th:classappend="${payment.paymentStatus == 'PAID'} ? 'status paid' :
                      (${payment.paymentStatus == 'PENDING'} ? 'status pending' : 'status due')">
                </span>

            </div>

        </div>

        <!-- ACTIONS -->

        <div class="actions">

            <a th:href="@{/student/payment/receipt}"
               class="btn receipt-btn">
                <i class="fa-solid fa-print"></i>
                Print Receipt
            </a>

            <a th:href="@{/indexStudent}"
               class="btn back-btn">
                <i class="fa-solid fa-arrow-left"></i>
                Dashboard
            </a>

        </div>

    </div>

</div>

</body>
</html>
