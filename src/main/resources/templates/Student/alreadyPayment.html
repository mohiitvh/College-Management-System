<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Successful | Apna College</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:linear-gradient(135deg,#0f172a,#1e293b,#0f766e);
}

.card{
    width:100%;
    max-width:600px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:25px;
    padding:50px 40px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
    animation:fadeUp .8s ease;
}

.success-icon{
    width:110px;
    height:110px;
    margin:auto;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#10b981,#22c55e);
    color:white;
    font-size:50px;
    box-shadow:0 15px 35px rgba(34,197,94,.4);
    margin-bottom:25px;
}

h1{
    color:#fff;
    font-size:32px;
    font-weight:700;
    margin-bottom:15px;
}

p{
    color:#cbd5e1;
    font-size:17px;
    line-height:1.8;
    margin-bottom:35px;
}

.btn-group{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.btn{
    text-decoration:none;
    padding:14px 28px;
    border-radius:12px;
    font-weight:600;
    transition:.3s;
}

.receipt-btn{
    background:linear-gradient(135deg,#10b981,#22c55e);
    color:white;
    box-shadow:0 10px 25px rgba(34,197,94,.4);
}

.receipt-btn:hover{
    transform:translateY(-4px);
}

.dashboard-btn{
    background:rgba(255,255,255,0.12);
    color:white;
    border:1px solid rgba(255,255,255,0.2);
}

.dashboard-btn:hover{
    background:rgba(255,255,255,0.2);
    transform:translateY(-4px);
}

.note{
    margin-top:25px;
    color:#94a3b8;
    font-size:14px;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:600px){

    .card{
        padding:40px 25px;
    }

    h1{
        font-size:26px;
    }

    .btn{
        width:100%;
    }

    .btn-group{
        flex-direction:column;
    }
}

</style>

</head>
<body>

<div class="card">

    <div class="success-icon">
        <i class="fa-solid fa-circle-check"></i>
    </div>

    <h1>Payment Completed</h1>

    <p>
        Your fee payment has been completed successfully.
        Thank you for submitting your payment. You can view and download your receipt anytime.
    </p>

    <div class="btn-group">

        <a th:href="@{/student/payment/receipt}" class="btn receipt-btn">
            <i class="fa-solid fa-file-invoice"></i>
            View Receipt
        </a>

        <a th:href="@{/indexStudent}" class="btn dashboard-btn">
            <i class="fa-solid fa-house"></i>
            Back Dashboard
        </a>

    </div>

    <div class="note">
        Payment status verified successfully.
    </div>

</div>

</body>
</html>
