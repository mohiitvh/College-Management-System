<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leave Details | Student Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7ff;
}

/* HEADER */
.header{
    background:linear-gradient(135deg,#0d6efd,#6610f2);
    color:white;
    padding:45px 20px;
    text-align:center;
    border-radius:0 0 35px 35px;
}

.header h1{
    font-size:32px;
}

.header p{
    opacity:0.9;
    font-size:14px;
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:-40px auto 40px;
    padding:0 20px;
}

/* CARD */
.card{
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

/* TITLE */
.card-title{
    background:linear-gradient(135deg,#0d6efd,#6610f2);
    color:white;
    padding:18px 25px;
    font-size:18px;
    font-weight:600;
    display:flex;
    align-items:center;
    gap:10px;
}

/* DETAILS */
.details{
    padding:25px;
}

/* ROW */
.row{
    display:flex;
    justify-content:space-between;
    padding:15px 0;
    border-bottom:1px solid #f1f5f9;
    transition:0.2s;
}

.row:hover{
    background:#f8fbff;
    padding-left:10px;
}

.row:last-child{
    border-bottom:none;
}

.label{
    color:#64748b;
    font-weight:500;
    font-size:14px;
}

.value{
    color:#071952;
    font-weight:600;
    font-size:14px;
}

/* STATUS */
.status{
    padding:6px 14px;
    border-radius:20px;
    font-size:12px;
    font-weight:600;
}

.pending{
    background:#fff7cc;
    color:#92400e;
}

.approved{
    background:#dcfce7;
    color:#166534;
}

.rejected{
    background:#fee2e2;
    color:#991b1b;
}

/* REASON BOX */
.reason-box{
    margin-top:25px;
    background:#f8fafc;
    border-left:5px solid #0d6efd;
    padding:20px;
    border-radius:15px;
}

.reason-box h3{
    color:#071952;
    margin-bottom:10px;
}

.reason-box p{
    color:#475569;
    line-height:1.7;
    font-size:14px;
}

/* BUTTON */
.btn-area{
    text-align:center;
    margin-top:30px;
}

.back-btn{
    text-decoration:none;
    background:linear-gradient(135deg,#0d6efd,#6610f2);
    color:white;
    padding:12px 22px;
    border-radius:12px;
    font-weight:600;
    display:inline-flex;
    align-items:center;
    gap:8px;
    transition:0.3s;
}

.back-btn:hover{
    transform:translateY(-2px);
}

/* RESPONSIVE */
@media(max-width:768px){

.row{
    flex-direction:column;
    gap:6px;
}

.value{
    text-align:left;
}

}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h1><i class="fa-solid fa-file-lines"></i> Leave Details</h1>
    <p>Complete information of your leave application</p>
</div>

<div class="container">

<div class="card">

<div class="card-title">
    <i class="fa-solid fa-circle-info"></i>
    Leave Information
</div>

<div class="details">

<div class="row">
    <div class="label">Leave ID</div>
    <div class="value" th:text="${leave.id}"></div>
</div>

<div class="row">
    <div class="label">Student Name</div>
    <div class="value" th:text="${leave.name}"></div>
</div>

<div class="row">
    <div class="label">Leave Type</div>
    <div class="value" th:text="${leave.leaveType}"></div>
</div>

<div class="row">
    <div class="label">From Date</div>
    <div class="value" th:text="${leave.fromDate}"></div>
</div>

<div class="row">
    <div class="label">To Date</div>
    <div class="value" th:text="${leave.toDate}"></div>
</div>

<div class="row">
    <div class="label">Total Days</div>
    <div class="value" th:text="${leave.totalDays}"></div>
</div>

<div class="row">
    <div class="label">Applied Date</div>
    <div class="value" th:text="${leave.appliedDate}"></div>
</div>

<div class="row">
    <div class="label">Status</div>
    <div class="value">

        <span th:if="${leave.status=='Pending'}" class="status pending">Pending</span>
        <span th:if="${leave.status=='Approved'}" class="status approved">Approved</span>
        <span th:if="${leave.status=='Rejected'}" class="status rejected">Rejected</span>

    </div>
</div>

<div class="reason-box">

    <h3><i class="fa-solid fa-comment"></i> Reason</h3>

    <p th:text="${leave.reason}"></p>

</div>

<div class="btn-area">

    <a th:href="@{/student/leave-history}" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i> Back To History
    </a>

</div>

</div>

</div>

</div>

</body>
</html>
