<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admission Required | Apna College</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    padding:20px;
}

.container{
    max-width:550px;
    width:100%;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:25px;
    padding:50px 40px;
    text-align:center;

    box-shadow:
        0 20px 50px rgba(0,0,0,0.4),
        inset 0 1px 1px rgba(255,255,255,0.2);

    animation:fadeUp .8s ease;
}

.icon{
    width:100px;
    height:100px;

    margin:auto;
    margin-bottom:25px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    background:linear-gradient(135deg,#f59e0b,#f97316);

    color:white;
    font-size:45px;

    box-shadow:0 15px 35px rgba(249,115,22,.4);
}

h1{
    color:#fff;
    font-size:30px;
    font-weight:700;
    margin-bottom:15px;
}

p{
    color:#cbd5e1;
    font-size:16px;
    line-height:1.8;
    margin-bottom:35px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.btn{

    display:inline-block;

    text-decoration:none;

    color:white;

    padding:15px 35px;

    border-radius:12px;

    font-size:15px;
    font-weight:600;

    transition:.3s;
}

.btn:hover{

    transform:translateY(-4px);

}

.btn-primary{

    background:linear-gradient(135deg,#2563eb,#3b82f6);

    box-shadow:
    0 10px 25px rgba(37,99,235,.4);

}

.btn-primary:hover{

    box-shadow:
    0 15px 35px rgba(37,99,235,.6);

}

.btn-dark{

    background:
    linear-gradient(135deg,#111827,#374151);

    box-shadow:
    0 10px 25px rgba(17,24,39,.35);

}

.btn-dark:hover{

    box-shadow:
    0 15px 35px rgba(17,24,39,.5);

}

.note{

    margin-top:25px;

    color:#94a3b8;

    font-size:13px;

}

@keyframes fadeUp{

    from{

        opacity:0;

        transform:translateY(30px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}

</style>

</head>

<body>

<div class="container">

    <div class="card">

        <div class="icon">

            <i class="fa-solid fa-file-circle-exclamation"></i>

        </div>

        <h1>

            Admission Form Not Filled

        </h1>

        <p>

            It looks like you have not completed your admission process yet.

            Please fill out the admission form to continue accessing student services.

        </p>

        <div class="buttons">

            <a th:href="@{/admission}"
               class="btn btn-primary">

                <i class="fa-solid fa-pen-to-square"></i>

                Apply Admission Form

            </a>

            <a th:href="@{/indexStudent}"
               class="btn btn-dark">

                <i class="fa-solid fa-house"></i>

                Back To Dashboard

            </a>

        </div>

        <div class="note">

            Complete your admission form to unlock all student features.

        </div>

    </div>

</div>

</body>

</html>
