<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0d6efd,#6610f2);
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 20px 50px rgba(0,0,0,0.15);
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h1{
    color:#0d1b3d;
    font-size:32px;
    font-weight:800;
}

.logo p{
    color:#666;
    margin-top:5px;
}

form{
    display:flex;
    flex-direction:column;
    gap:20px;
}

.input-group{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:8px;
    font-weight:600;
    color:#333;
}

input{
    padding:15px;
    border:2px solid #e5e7eb;
    border-radius:12px;
    outline:none;
    font-size:15px;
    transition:.3s;
}

input:focus{
    border-color:#0d6efd;
    box-shadow:0 0 10px rgba(13,110,253,.2);
}

.btn{
    border:none;
    cursor:pointer;
    padding:15px;
    border-radius:12px;
    font-size:16px;
    font-weight:600;
    transition:.3s;
}

.submit-btn{
    background:linear-gradient(135deg,#0d6efd,#6610f2);
    color:white;
}

.submit-btn:hover{
    transform:translateY(-3px);
}

.home-btn{
    margin-top:12px;
    background:#0d1b3d;
    color:white;
    text-decoration:none;
    text-align:center;
    display:block;
}

.home-btn:hover{
    background:#162b5f;
}

.success{
    margin-top:15px;
    text-align:center;
    color:green;
    font-weight:600;
}

</style>
</head>
<body>

<div class="container">

    <div class="logo">
        <h1>Apna College</h1>
        <p>Student Registration Portal</p>
    </div>

    <form id="f">

        <div class="input-group">
            <label>Student Name</label>
            <input type="text" name="name" placeholder="Enter your name" required>
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <button type="submit" class="btn submit-btn">
            Save Student
        </button>

    </form>

    <a href="master.html" class="btn home-btn">
        🏛 Apna College
    </a>

    <div id="msg" class="success"></div>

</div>

<script>

document.getElementById("f").addEventListener("submit", async (e) => {

    e.preventDefault();

    const data = {
        name: e.target.name.value,
        email: e.target.email.value
    };

    try{

        const response = await fetch("http://localhost:8080/students",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(data)
        });

        if(response.ok){

            document.getElementById("msg").innerHTML =
            "✅ Student Saved Successfully";

            e.target.reset();

        }else{

            document.getElementById("msg").innerHTML =
            "❌ Failed to Save";

        }

    }catch(error){

        document.getElementById("msg").innerHTML =
        "⚠ Server Connection Error";

    }

});

</script>

</body>
</html>
