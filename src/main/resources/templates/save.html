<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admission Successful</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
}

.card{
    width:90%;
    max-width:700px;
    background:#fff;
    border-radius:25px;
    text-align:center;
    padding:50px;
    box-shadow:0 20px 60px rgba(0,0,0,.25);
}

.success-icon{
    width:120px;
    height:120px;
    margin:auto;
    border-radius:50%;
    background:#22c55e;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:60px;
    margin-bottom:25px;
}

h1{
    color:#16a34a;
    margin-bottom:15px;
}

p{
    color:#555;
    line-height:1.8;
    margin-bottom:30px;
}

.btn{
    display:inline-block;
    padding:14px 30px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:12px;
    margin:10px;
}

.btn:hover{
    background:#1d4ed8;
}

</style>
</head>
<body>

<div class="card">

    <div class="success-icon">
        ✓
    </div>

    <h1>Admission Submitted Successfully</h1>

    <p>
        Congratulations! Your admission form has been submitted successfully.
        Our admission team will verify your documents and contact you soon.
    </p>

    <a href="/" class="btn">
        Home Page
    </a>

    <a href="/loginStudent" class="btn">
        Student Login
    </a>

</div>

</body>
</html>
