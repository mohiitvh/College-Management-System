<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>APNA COLLEGE Admission Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
	.upload-row{
		    display:grid;
		    grid-template-columns:1fr 1fr;
		    gap:20px;
		}
		.photo-preview{
		    width:180px;
		    height:180px;
		    object-fit:cover;
		    border-radius:15px;
		    border:2px dashed #2563eb;
		    margin-top:10px;
		}
	
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    min-height:100vh;
    padding:40px;
}

.card{
    background:#fff;
    border-radius:28px;
    overflow:hidden;
    box-shadow:0 25px 70px rgba(0,0,0,.35);
}

.header{
    background:linear-gradient(135deg,#0d6efd,#1e3a8a);
    color:white;
    text-align:center;
    padding:40px;
}

.header h1{
    font-size:40px;
    letter-spacing:1px;
}

.form-body{
    padding:45px;
}

/* SECTION CARD */
.section{
    margin-bottom:35px;
    padding:25px;
    border-radius:18px;
    background:#f8fafc;
    border:1px solid #e5e7eb;
    transition:.3s;
}

.section:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 30px rgba(0,0,0,.08);
}

.section-title{
    font-size:20px;
    font-weight:700;
    color:#1e3a8a;
    margin-bottom:18px;
}

/* INPUTS */
input,select,textarea{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #cbd5e1;
    outline:none;
    transition:.3s;
}

input:focus,select:focus,textarea:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,.15);
}

/* UPLOAD BOX */
.upload-box{
    background:white;
    border:2px dashed #2563eb;
    border-radius:18px;
    padding:15px;
    position:relative;
}

/* FIX: IMAGE NEVER DISAPPEAR */
.photo-preview{
    width:140px;
    height:140px;
    border-radius:15px;
    object-fit:cover;
    border:2px solid #2563eb;
    margin-top:12px;
    display:none;
}

/* ROW */
.upload-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

/* BUTTON */
.submit-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    font-size:18px;
    font-weight:700;
    color:white;
    background:linear-gradient(135deg,#2563eb,#1e40af);
    cursor:pointer;
    transition:.3s;
}

.submit-btn:hover{
    transform:translateY(-3px);
}

/* MOBILE */
@media(max-width:768px){
    .upload-row{
        grid-template-columns:1fr;
    }
}

</style>
</head>
<body>

<div class="container">

<div class="card">

<div class="header">
    <h1>APNA COLLEGE</h1>
    <p>Online Admission Portal 2026-27</p>
</div>

<div class="form-body">

	<form th:action="@{/admission/save}"
	      method="post"
	      enctype="multipart/form-data">
    <!-- PERSONAL DETAILS -->
    <div class="section">

        <div class="section-title">
            Personal Details
        </div>

        <div class="grid">

			<input type="text"
			       name="fullName"
			       th:value="${student.name}"
			       readonly
			       required>
				   <div>
				       <label>Date of Birth *</label>
				       <input type="date" name="dateOfBirth" required>
				   </div>

            <select name="gender">
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

            <select name="category">
               <option value="">Select Category</option>
                <option>General</option>
                <option>OBC</option>
                <option>SC</option>
                <option>ST</option>
                <option>EWS</option>
            </select>

            <input type="text" name="nationality" placeholder="Nationality" required>

			<input type="text"
			       name="aadhaarNumber"
			       maxlength="12"
			       pattern="[0-9]{12}"
			       placeholder="Aadhaar Number"required>

        </div>

    </div>

    <!-- GUARDIAN DETAILS -->
    <div class="section">

        <div class="section-title">
            Guardian Details
        </div>

        <div class="grid">

            <input type="text" name="fatherName" placeholder="Father Name">

            <input type="text" name="fatheroccupation" placeholder="Father Occupation">

            <input type="text" name="motherName" placeholder="Mother Name">

            <input type="text" name="motheroccupation" placeholder="Mother Occupation">

            <input type="text" name="guardianName" placeholder="Guardian Name">

            <input type="number" name="annualIncome" placeholder="Annual Income">

        </div>

    </div>
	
	<!-- =========================
	     OTHER DETAILS
	========================= -->
	<div class="section">

	    <div class="section-title">
	        Other Details
	    </div>

	    <div class="grid">

	        <select name="bloodGroup">
	            <option value="">Select Blood Group</option>
	            <option>A+</option>
	            <option>A-</option>
	            <option>B+</option>
	            <option>B-</option>
	            <option>AB+</option>
	            <option>AB-</option>
	            <option>O+</option>
	            <option>O-</option>
	        </select>

	        <select name="disabilityStatus">
	            <option value="">Disability Status</option>
	            <option>No</option>
	            <option>Yes</option>
	        </select>

	        <input type="text"
	               name="emergencyContact"
	               placeholder="Emergency Contact">

	        <textarea class="full"
	                  name="disabilityDetails"
	                  placeholder="If disability Yes, specify details"></textarea>

	    </div>

	</div>


	<!-- =========================
	     CONTACT DETAILS
	========================= -->
	<div class="section">

	    <div class="section-title">
	        Contact Details
	    </div>

	    <div class="grid">

			<input type="text"
			       name="mobileNumber"
			       th:value="${student.phone}"
			       readonly>

				   <input type="email"
				          name="emailId"
				          th:value="${student.email}"
				          readonly>
				   <input type="text"
				          name="guardianMobile"
				          pattern="[0-9]{10}"
				          maxlength="10"
				          placeholder="Guardian Mobile Number"
				          required>
	        

	        <textarea class="full"
	                  name="currentAddress"
	                  placeholder="Current Address"></textarea>

	        <textarea class="full"
	                  name="permanentAddress"
	                  placeholder="Permanent Address"></textarea>

	    </div>

	</div>


	<!-- =========================
	     PREVIOUS ACADEMIC DETAILS
	========================= -->
	<div class="section">

	    <div class="section-title">
	        Previous Academic Details
	    </div>

	    <div class="grid">

	        <input type="text"
	               name="previousSchoolCollege"
	               placeholder="Previous School / College">

	        <input type="text"
	               name="boardUniversity"
	               placeholder="Board / University">

	        <input type="text"
	               name="lastPassedCourse"
	               placeholder="Last Passed Course">

	        <input type="text"
	               name="rollRegistrationNumber"
	               placeholder="Roll / Registration Number">

				   <input type="number"
				          name="passingYear"
				          min="2000"
				          max="2030"
				          placeholder="Passing Year">

				   <input type="text"
				          name="marksPercentageCgpa"
				          placeholder="Marks / Percentage / CGPA">
	        
				   
				   <!-- Academic Marksheet -->
			</div>	   	       
		<div class="upload-box">
			            <label>Latest Academic Marksheet *</label>
			            <input type="file"
						       name="marksheetUploadFile"
						       accept=".pdf"
						       required>
			        </div>

	</div>

    <!-- ADMISSION DETAILS -->
    <div class="section">

        <div class="section-title">
            Admission Details
        </div>

		<div class="grid">

		    <select id="ugpg" name="ug_pg">
		        <option value="">Select Level</option>
		        <option value="UG">UG</option>
		        <option value="PG">PG</option>
		    </select>

		    <select name="courseId" required>
		        <option value="">Select Course</option>

		        <option th:each="c : ${courses}"
		                th:value="${c.id}"
		                th:text="${c.courseName}">
		        </option>
		    </select>

			<input type="text"
			       name="sessionBatch"
			       value="2026-27"
			       readonly>

		</div>
    </div>

  
	
	<!-- =========================
	     DOCUMENT UPLOADS
	========================= -->

	<div class="section">

	    <div class="section-title">
	        Document Uploads
	    </div>

	    <div class="grid">

	        <!-- Passport Photo -->
			<div class="upload-row">

			    <div class="upload-box">
			        <label>Passport Photo *</label>
			        <input type="file" name="passportPhotoFile"
			               accept="image/*"
			               onchange="previewPassport(event)">
			        <img id="passportPreview" class="photo-preview">
			    </div>

			    <div class="upload-box">
			        <label>Signature *</label>
			        <input type="file" name="signatureFile"
			               accept="image/*"
			               onchange="previewSignature(event)">
			        <img id="signaturePreview" class="photo-preview">
			    </div>

			</div>
	       
				        
	        <!-- Aadhaar -->
	        <div class="upload-box">
	            <label>Aadhaar Card *</label>
				<input type="file"
				       name="aadhaarCardFile"
				       accept=".pdf"
				       required>
	        </div>

	        <!-- 10th -->
	        <div class="upload-box">
	            <label>10th Marksheet *</label>
				<input type="file"
				       name="class10MarksheetFile"
				       accept=".pdf"
				       required>
	        </div>

	        <!-- 12th -->
	        <div class="upload-box">
	            <label>12th Marksheet *</label>
				<input type="file"
				       name="class12MarksheetFile"
				       accept=".pdf">
	        </div>

	        <!-- Migration -->
	        <div class="upload-box">
	            <label>Migration Certificate</label>
				<input type="file"
				       name="migrationCertificateFile"
				       accept=".pdf">
	        </div>

	        <!-- Category -->
	        <div class="upload-box">
	            <label>Category Certificate</label>
				<input type="file"
				       name="categoryCertificateFile"
				       accept=".pdf">
	        </div>

	        <!-- Academic Marksheet -->
	        

	    </div>

	</div>
	<!-- =========================
	     LOGIN DETAILS
	========================= -->
	<div class="section">

	    <div class="section-title">
	        Login Details
	    </div>

	    <div class="grid">

			<input type="text"
			       name="username"
			       th:value="${student.email}"
			       readonly>

	        

	    </div>

	</div>


	<!-- =========================
	     DECLARATION
	========================= -->
	<div class="section">

	    <div class="section-title">
	        Declaration
	    </div>

	    <div class="declaration-box"
	         style="background:#fff;border:1px solid #dbeafe;padding:20px;border-radius:15px;">

	        <label class="checkbox-row"
	               style="display:flex;align-items:flex-start;gap:12px;margin-bottom:15px;cursor:pointer;">

	            <input type="checkbox"
	                   name="declarationCheckbox"
	                   required
	                   style="width:20px;height:20px;accent-color:#2563eb;">

	            <span style="color:#374151;">
	                I hereby declare that all information provided by me is true and correct.
	            </span>
	        </label>

	        <label class="checkbox-row"
	               style="display:flex;align-items:flex-start;gap:12px;cursor:pointer;">

	            <input type="checkbox"
	                   name="termsConditions"
	                   required
	                   style="width:20px;height:20px;accent-color:#2563eb;">

	            <span style="color:#374151;">
	                I agree to the Terms & Conditions of APNA COLLEGE.
	            </span>
	        </label>

	    </div>
	</div>

	<button type="submit" class="submit-btn">
	    Submit Admission Form
	</button>
    
</form>

</div>
</div>
</div>
<script>
function validateFile(file){
    if(!file) return false;

    if(file.size > 2 * 1024 * 1024){
        alert("File must be less than 2MB");
        return false;
    }
    return true;
}

function previewPassport(event){
    let file = event.target.files[0];
    if(!validateFile(file)){
        event.target.value = "";
        return;
    }

    let preview = document.getElementById("passportPreview");
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
}

function previewSignature(event){
    let file = event.target.files[0];
    if(!validateFile(file)){
        event.target.value = "";
        return;
    }

    let preview = document.getElementById("signaturePreview");
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
}
</script>


</body>
</html>
