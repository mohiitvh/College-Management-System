<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Staff Profile | Apna College</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7ff;
padding:40px;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:#fff;
border-radius:30px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,.08);
}

/* HEADER */

.header{
background:linear-gradient(135deg,#0d6efd,#6610f2);
padding:40px;
color:white;
text-align:center;
}

.header h1{
font-size:32px;
margin-bottom:10px;
}

/* PROFILE */

.profile{
padding:40px;
display:flex;
align-items:center;
gap:30px;
flex-wrap:wrap;
border-bottom:1px solid #eee;
}

.photo-box{
width:170px;
height:170px;
border-radius:50%;
padding:6px;
background:linear-gradient(135deg,#0d6efd,#6610f2);
}

.photo-box img{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
background:#eee;
}

.profile-info h2{
font-size:32px;
color:#071952;
margin-bottom:10px;
}

.badge{
display:inline-block;
padding:10px 18px;
border-radius:30px;
background:#dcfce7;
color:#166534;
font-weight:700;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
padding:40px;
}

.box{
background:#f8fafc;
border:1px solid #e5e7eb;
padding:25px;
border-radius:20px;
}

.box h3{
color:#0d6efd;
margin-bottom:20px;
}

.row{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #eee;
}

.label{
font-weight:600;
color:#64748b;
}

.value{
font-weight:600;
color:#111827;
}

/* BUTTONS */

.action{
display:flex;
gap:15px;
padding:0 40px 40px;
flex-wrap:wrap;
}

.btn{
text-decoration:none;
padding:14px 25px;
border-radius:50px;
font-weight:700;
color:white;
}

.home{
background:#0d6efd;
}

.dashboard{
background:#16a34a;
}

.btn:hover{
opacity:.9;
}

@media(max-width:768px){

.profile{
justify-content:center;
text-align:center;
}

.action{
justify-content:center;
}

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<!-- HEADER -->

<div class="header">

<h1>APNA COLLEGE</h1>

<p>Staff Profile Details</p>

</div>

<!-- PROFILE -->

<div class="profile">

<div class="photo-box">

<img th:src="@{'/staff/photo/' + ${staff.id}}"
     alt="Staff Photo">

</div>

<div class="profile-info">

<h2 th:text="${staff.name}">
Staff Name
</h2>

<div class="badge"
     th:text="${staff.department}">
Department
</div>

</div>

</div>

<!-- DETAILS -->

<div class="grid">

<div class="box">

<h3>
<i class="fa-solid fa-user"></i>
 Personal Information
</h3>

<div class="row">
<span class="label">Staff ID</span>
<span class="value"
      th:text="${staff.id}">
</span>
</div>

<div class="row">
<span class="label">Full Name</span>
<span class="value"
      th:text="${staff.name}">
</span>
</div>

<div class="row">
<span class="label">Phone</span>
<span class="value"
      th:text="${staff.phone}">
</span>
</div>

</div>

<div class="box">

<h3>
<i class="fa-solid fa-building"></i>
 Employment Details
</h3>

<div class="row">
<span class="label">Department</span>
<span class="value"
      th:text="${staff.department}">
</span>
</div>

<div class="row">
<span class="label">Official Email</span>
<span class="value"
      th:text="${staff.email}">
</span>
</div>

<div class="row">
<span class="label">Status</span>
<span class="value">
Active
</span>
</div>

</div>

</div>

<!-- BUTTONS -->

<div class="action">

<a th:href="@{/indexStaff}"
   class="btn dashboard">
Dashboard
</a>

<a th:href="@{/}"
   class="btn home">
Home
</a>

</div>

</div>

</div>

</body>

</html>
