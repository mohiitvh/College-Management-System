<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leave History | Staff Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: linear-gradient(135deg,#eef2ff,#f8fafc);
    padding:30px;
}

/* MAIN WRAPPER */
.container{
    max-width:1300px;
    margin:auto;
}

/* HEADER */
.header{
    background: white;
    padding: 22px 28px;
    border-radius: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,.06);
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.header h2{
    color:#0f172a;
    font-size:22px;
}

.header p{
    color:#64748b;
    font-size:13px;
    margin-top:3px;
}

/* BACK BUTTON */
.back-btn{
    text-decoration:none;
    background: linear-gradient(135deg,#2563eb,#1e40af);
    color:white;
    padding:10px 18px;
    border-radius:10px;
    font-weight:600;
    font-size:14px;
    transition:.3s;
}

.back-btn:hover{
    transform: translateY(-2px);
}

/* TABLE CARD */
.table-card{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 18px 40px rgba(0,0,0,.08);
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background: linear-gradient(135deg,#2563eb,#1e3a8a);
}

thead th{
    color:white;
    padding:15px;
    text-align:left;
    font-size:13px;
    letter-spacing:.5px;
}

tbody td{
    padding:15px;
    border-bottom:1px solid #eef2f7;
    font-size:14px;
    color:#334155;
}

tbody tr:hover{
    background:#f8fafc;
}

/* STATUS BADGES */
.status{
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:600;
    display:inline-block;
}

.pending{
    background:#fff7ed;
    color:#c2410c;
}

.approved{
    background:#ecfdf5;
    color:#047857;
}

.rejected{
    background:#fef2f2;
    color:#b91c1c;
}

/* VIEW BUTTON */
.view-btn{
    text-decoration:none;
    background:#3b82f6;
    color:white;
    padding:7px 12px;
    border-radius:8px;
    font-size:12px;
    font-weight:600;
    transition:.2s;
}

.view-btn:hover{
    background:#1d4ed8;
}

/* EMPTY STATE */
.no-record{
    text-align:center;
    padding:40px;
    color:#64748b;
}

/* RESPONSIVE */
@media(max-width:768px){
    .header{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
    }

    table{
        min-width:900px;
    }
}

</style>
</head>

<body>

<div class="container">

<div class="header">
    <div>
        <h2>Leave History</h2>
        <p>All Staff Leave Applications</p>
    </div>

    <a th:href="@{/indexStaff}" class="back-btn">Back</a>
</div>

<div class="table-card">

<table>

<thead>
<tr>
    <th>ID</th>
    <th>Type</th>
    <th>From</th>
    <th>To</th>
    <th>Days</th>
    <th>Applied</th>
    <th>Status</th>
    <th>Action</th>
</tr>
</thead>

<tbody>

<tr th:if="${#lists.isEmpty(leaves)}">
    <td colspan="8" class="no-record">
        No Leave Applications Found
    </td>
</tr>

<tr th:each="leave : ${leaves}">

    <td th:text="${leave.id}"></td>
    <td th:text="${leave.leaveType}"></td>
    <td th:text="${leave.fromDate}"></td>
    <td th:text="${leave.toDate}"></td>
    <td th:text="${leave.totalDays}"></td>
    <td th:text="${leave.appliedDate}"></td>

    <td>
        <span th:if="${leave.status=='Pending'}" class="status pending">Pending</span>
        <span th:if="${leave.status=='Approved'}" class="status approved">Approved</span>
        <span th:if="${leave.status=='Rejected'}" class="status rejected">Rejected</span>
    </td>

    <td>
        <a th:href="@{/staff/leave-details/{id}(id=${leave.id})}" class="view-btn">
            View
        </a>
    </td>

</tr>

</tbody>

</table>

</div>

</div>

</body>
</html>
