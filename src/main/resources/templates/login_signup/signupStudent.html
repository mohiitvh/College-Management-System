<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Student Registration | Apna College</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:
linear-gradient(rgba(0,40,90,.75),rgba(0,40,90,.75)),
url('https://images.pexels.com/photos/1454360/pexels-photo-1454360.jpeg?auto=compress&cs=tinysrgb&w=1600');
background-size:cover;
background-position:center;
}

.back-btn{
position:fixed;
top:20px;
left:20px;
padding:12px 22px;
text-decoration:none;
background:rgba(255,255,255,.15);
border:1px solid rgba(255,255,255,.2);
backdrop-filter:blur(10px);
border-radius:50px;
color:#fff;
font-weight:600;
}

.container{
width:100%;
max-width:550px;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,.12);
border:1px solid rgba(255,255,255,.2);
backdrop-filter:blur(18px);
box-shadow:0 20px 60px rgba(0,0,0,.3);
}

.logo{
text-align:center;
color:#fff;
font-size:18px;
font-weight:700;
letter-spacing:2px;
margin-bottom:10px;
}

h2{
text-align:center;
color:#fff;
font-size:34px;
margin-bottom:8px;
}

.subtitle{
text-align:center;
color:#ddd;
margin-bottom:30px;
font-size:14px;
}

.input-group{
margin-bottom:18px;
}

.input-group input,
.input-group select{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,.15);
color:#fff;
font-size:15px;
}

.input-group input::placeholder{
color:#ddd;
}

.input-group select option{
color:#000;
}

.password-box{
position:relative;
}

.toggle{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:13px;
font-weight:600;
color:#fff;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:50px;
background:linear-gradient(135deg,#0d6efd,#00b4ff);
color:#fff;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
}

.link{
text-align:center;
margin-top:20px;
color:#eee;
}

.link a{
color:#fff;
font-weight:700;
text-decoration:none;
}

.footer{
text-align:center;
margin-top:20px;
color:#ccc;
font-size:13px;
}

@media(max-width:600px){

.container{
padding:30px 20px;
}

h2{
font-size:28px;
}

}

</style>
</head>

<body>

	<a th:href="@{/}" class="back-btn">
	    <i class="fa-solid fa-arrow-left"></i> Back to Home
	</a>

<div class="container">

<div class="logo">
APNA COLLEGE
</div>

<h2>Student Registration</h2>

<p class="subtitle">
Create Your Student Account
</p>

<form th:action="@{/signupStudent}"
      method="post"
      enctype="multipart/form-data">

<div class="input-group">
<input type="text"
name="name"
placeholder="Full Name"
required>
</div>

<div class="input-group">
<input type="email"
name="email"
placeholder="Student Email"
required>
</div>



<div class="input-group">
<input type="text"
name="phone"
placeholder="Phone Number"
required>
</div>

<!-- Program Type -->

<!-- Program Type -->

<div class="input-group">

<select id="programType"
        name="programType"
        onchange="loadCourses()"
        required>

<option value="">Select Program Type</option>

<option value="UG">
UG (Under Graduate)
</option>

<option value="PG">
PG (Post Graduate)
</option>

</select>

</div>

<!-- Course -->

<div class="input-group">

<select id="course"
        name="course"
        required>

<option value="">
Select Course
</option>

</select>

</div>

<!-- Password -->

<div class="input-group">

<div class="password-box">

<input type="password"
id="studentPass"
name="password"
placeholder="Create Password"
required>

<span class="toggle"
onclick="togglePassword(this)">
Show
</span>

</div>
<div class="input-group">

    <label style="color:white;display:block;margin-bottom:8px;">
        Upload Student Photo
    </label>

    <input type="file"
           name="photo"
           accept="image/*"
           required>

</div>

</div>

<button type="submit">
Create Student Account
</button>

</form>

<div class="link">
Already have an account?
<a th:href="@{/loginStudent}">
Login Here
</a>
</div>

<div class="footer">
© 2026 Apna College Student Portal
</div>

</div>

<script>

function loadCourses() {

    const type = document.getElementById("programType").value;
    const course = document.getElementById("course");

    course.innerHTML = '<option value="">Select Course</option>';

    if(type === "UG"){

        course.innerHTML += `
            <option value="B.Tech">B.Tech</option>
            <option value="BCA">BCA</option>
            <option value="BBA">BBA</option>
            <option value="B.Sc">B.Sc</option>
            <option value="BA">BA</option>
            <option value="B.Com">B.Com</option>
            <option value="Diploma">Diploma</option>
        `;

    }

    else if(type === "PG"){

        course.innerHTML += `
            <option value="MA">MA</option>
            <option value="M.Sc">M.Sc</option>
            <option value="MCA">MCA</option>
            <option value="M.Tech">M.Tech</option>
            <option value="MBA">MBA</option>
            <option value="M.Com">M.Com</option>
        `;

    }

}

function togglePassword(el){

    const pass = document.getElementById("studentPass");

    if(pass.type === "password"){
        pass.type = "text";
        el.innerText = "Hide";
    }else{
        pass.type = "password";
        el.innerText = "Show";
    }

}

</script>
</body>
</html>
