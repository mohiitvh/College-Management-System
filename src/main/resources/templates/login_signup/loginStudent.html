<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Student Login | Apna College</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(0,50,120,.75),rgba(0,50,120,.75)),
url('https://images.pexels.com/photos/1454360/pexels-photo-1454360.jpeg?auto=compress&cs=tinysrgb&w=1600');
background-size:cover;
background-position:center;
padding:20px;
}

.login-card{
width:100%;
max-width:430px;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.2);
box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.logo{
text-align:center;
font-size:18px;
font-weight:700;
color:#fff;
margin-bottom:10px;
}

h2{
text-align:center;
color:#fff;
font-size:34px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#eee;
margin-bottom:30px;
}

input{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:12px;
margin-bottom:18px;
background:rgba(255,255,255,.15);
color:#fff;
}

input::placeholder{
color:#ddd;
}

.password-box{
position:relative;
}

.toggle{
position:absolute;
right:15px;
top:35%;
cursor:pointer;
color:#fff;
font-size:13px;
font-weight:600;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:50px;
background:linear-gradient(135deg,#0d6efd,#00b4ff);
color:#fff;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.footer{
text-align:center;
margin-top:20px;
color:#eee;
font-size:13px;
}
.back-btn{
position:absolute;
top:25px;
left:25px;
padding:10px 18px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.25);
border-radius:50px;
color:#fff;
text-decoration:none;
font-weight:600;
font-size:14px;
transition:0.3s ease;
}

.back-btn:hover{
background:#fff;
color:#0d6efd;
transform:translateX(-3px);
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

</style>
</head>

<body>
	<a th:href="@{/}" class="back-btn">
	    <i class="fa-solid fa-arrow-left"></i> Back to Home
	</a>

<div class="login-card">

<div class="logo">APNA COLLEGE</div>

<h2>Student Login</h2>

<p class="subtitle">
Access Student Portal
</p>

<form th:action="@{/loginStudent}" method="post">

<input type="email"
name="email"
placeholder="Student Email"
required>

<div class="password-box">
<input type="password"
id="studentPass"
name="password"
placeholder="Password"
required>

<span class="toggle"
onclick="toggleStudent(this)">
Show
</span>
</div>

<button type="submit">
Login
</button>

</form>

<div class="footer" style="margin-top:20px;">
    Don't have an account?
    <a th:href="@{/signupStudent}"
       style="color:#fff;font-weight:700;text-decoration:none;">
       Create Account
    </a>
</div>

<div class="footer">
© 2026 Apna College Student Portal
</div>

</div>

<script>

function toggleStudent(el){

const pass=document.getElementById("studentPass");

if(pass.type==="password"){
pass.type="text";
el.innerText="Hide";
}else{
pass.type="password";
el.innerText="Show";
}

}

</script>

</body>
</html>
```
